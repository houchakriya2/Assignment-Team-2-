<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Exile&family=Kantumruy+Pro:ital,wght@0,100..700;1,100..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <div class="container">
        <div class="row">
            <div class="col-6 d-flex justify-content-center align-items-center">
                <div>
                    <img class=" logo" src="assets/img/logo/logo-sak-img-removebg-preview.png" alt="">
                </div>
            </div>
            <div class="col-6 d-flex justify-content-center align-items-center">
                <div class="card py-5 px-4">
                    <a href="login_nit.html" class="back"> <i class="bi bi-arrow-left text-secondary fs-4"></i></a>
                    <!-- <div id="liveAlertPlaceholder"></div> -->
                    <h1 class=" fs-2 fw-bold text-info">ចុះឈ្មោះ</h1>
                    <div class=" p-3">
                        <div class="row mb-4">
                            <div class="col">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="floatingInput" placeholder="name">
                                    <label for="floatingInput">នាមត្រកូល</label>
                                </div>

                            </div>
                            <div class=" col">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="floatingInput" placeholder="name">
                                    <label for="floatingInput">នាមខ្លួន</label>
                                </div>

                            </div>

                        </div>


                        <div class="form-floating mb-4">
                            <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                            <label for="floatingInput">អ៊ីមែល​ ​ឬ​ លេខទូរស័ព្ទ</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="email" class="form-control" id="floatingInput" placeholder="address">
                            <label for="floatingInput">ទីតាំងស្នាក់នៅ</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                            <label for="floatingPassword">លេខសម្ងាត់</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                            <label for="floatingPassword">បញ្ជាក់លេខសម្ងាត់</label>
                        </div>
                        <button type="button" onclick=" location.href='account_me.html'" class="btn btn-info px-5 w-100 p-2 mb-4"
                            id="liveAlertBtn">ចុះឈ្មោះ</button>
                        <div class=" d-flex justify-content-center gap-2">
                            <p class=" fw-medium">តើអ្នកមានគណនីហើយឬ ?</p>
                            <a href="login_nit.html" role="button"
                                class=" text-decoration-none text-primary">ចូលគណនី</a>
                        </div>

                    </div>

                </div>

            </div>


        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const alertPlaceholder = document.getElementById('liveAlertPlaceholder')
        const appendAlert = (message, type) => {
            const wrapper = document.createElement('div')
            wrapper.innerHTML = [
                `<div class="alert alert-${type} alert-dismissible" role="alert">`,
                `   <div>${message}</div>`,
                '   <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>',
                '</div>'
            ].join('')

            alertPlaceholder.append(wrapper)
        }

        const alertTrigger = document.getElementById('liveAlertBtn')
        if (alertTrigger) {
            alertTrigger.addEventListener('click', () => {
                appendAlert('Register Successfully!', 'success')
            })
        }
    </script>

</body>

</html>
