<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Profile</title>
<link rel="stylesheet" href="assets/css/style_chakriya.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f7fb;
    font-family:"Segoe UI", sans-serif;
    color:#202124;
}

/* Layout container */
.wrapper{
    max-width:900px;
    margin:60px auto;
}

/* Card style */
.card-box{
    background:white;
    border-radius:18px;
    border:1px solid #e0e0e0;
    box-shadow:0 1px 3px rgba(60,64,67,0.12);
}

/* Profile preview side */
.profile-side{
    text-align:center;
    padding:30px 20px;
    border-right:1px solid #eee;
}

.profile-side img{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #e8f0fe;
    margin-bottom:15px;
}

.profile-side h5{
    margin-bottom:3px;
}

.badge-custom{
    background:#e8f0fe;
    color:#1a73e8;
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
}

/* Form section */
.form-section{
    padding:30px;
}

.section-title{
    font-size:14px;
    font-weight:600;
    color:#5f6368;
    margin-bottom:15px;
    margin-top:10px;
}

/* Inputs */
.form-control{
    border-radius:12px;
    border:1px solid #dadce0;
    padding:10px 12px;
    font-size:14px;
}

.form-control:focus{
    border-color:#1a73e8;
    box-shadow:none;
}

/* Buttons */
.btn-primary{
    background:#1a73e8;
    border:none;
    border-radius:12px;
}

.btn-primary:hover{
    background:#1557b0;
}

.btn-light{
    border-radius:12px;
}

/* Layout split */
.grid{
    display:grid;
    grid-template-columns: 1fr 2fr;
}

/* Responsive */
@media(max-width:768px){
    .grid{
        grid-template-columns:1fr;
    }
    .profile-side{
        border-right:none;
        border-bottom:1px solid #eee;
    }
}
</style>
</head>

<body>

<div class="wrapper card-box">

    <div class="grid">

        <!-- LEFT SIDE PROFILE PREVIEW -->
        <div class="profile-side">
            <img src="assets/img/people.png">

            <h5>សុខ​ តារា</h5>
            <p class="text-muted mb-2">dara168@gmail.com</p>

            <span class="badge-custom">Premium Member</span>

            <hr>

            <small class="text-muted">
                Last updated: Today
            </small>
        </div>

        <!-- RIGHT SIDE FORM -->
        <div class="form-section">

            <h5 class="mb-3">កែប្រែព័ត៍មាន</h5>

            <!-- Personal Info -->
            <div class="section-title">PERSONAL INFORMATION</div>

            <div class="mb-3">
                <label class="form-label">ឈ្មោះ</label>
                <input type="text" class="form-control" value="Sok Dara">
            </div>

            <!-- Contact -->
            <div class="section-title">CONTACT DETAILS</div>

            <div class="mb-3">
                <label class="form-label">អ៊ីមែល​</label>
                <input type="email" class="form-control" value="dara@example.com">
            </div>

            <div class="mb-3">
                <label class="form-label">លេខទូរស័ព្ទ</label>
                <input type="text" class="form-control" value="+855 12 345 678">
            </div>

            <!-- Address -->
            <div class="section-title">ទីកន្លែង</div>

            <div class="mb-3">
                <textarea class="form-control" rows="3">Phnom Penh, Cambodia</textarea>
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2 mt-4">
                <button class="btn btn-primary w-100">
                    រក្សាទុកនិងកែប្រែ
                </button>

                <a href="indext.html" class="btn btn-light w-100">
                    បោះបង់
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
