<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Edit Profile</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background: linear-gradient(to right,#eef2ff,#f8f9ff);
            min-height: 100vh;
            display:flex;
            align-items:center;
        }

        .edit-card{
            border:none;
            border-radius:30px;
        }

        .form-control{
            border-radius:14px;
            padding:12px;
        }

        .btn-custom{
            border-radius:12px;
            padding:10px 25px;
        }

        .profile-img{
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
            border:5px solid #fff;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

    </style>

</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card shadow-lg edit-card">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <img src="assets/img/people.png"
                            class="profile-img">

                        <h2 class="mt-3">
                            Edit Profile
                        </h2>

                    </div>

                    <form>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Full Name
                                </label>

                                <input type="text"
                                    class="form-control"
                                    value="John Doe">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Email
                                </label>

                                <input type="email"
                                    class="form-control"
                                    value="johndoe@gmail.com">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Phone
                                </label>

                                <input type="text"
                                    class="form-control"
                                    value="+855 12 345 678">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Profile Image
                                </label>

                                <input type="file"
                                    class="form-control">

                            </div>

                            <div class="col-12 mb-4">

                                <label class="form-label">
                                    Address
                                </label>

                                <textarea class="form-control"
                                    rows="4">Phnom Penh, Cambodia</textarea>

                            </div>

                        </div>

                        <div class="text-center">

                            <button class="btn btn-success btn-custom">

                                <i class="bi bi-save"></i>
                                Save Changes

                            </button>

                            <a href="profile_me.html"
                                class="btn btn-secondary btn-custom">

                                Back

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
