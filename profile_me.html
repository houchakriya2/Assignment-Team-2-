<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Profile</title>
    <link rel="stylesheet" href="assets/css/style_chakriya.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background: linear-gradient(to right,#eef2ff,#f8f9ff);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .profile-card{
            border:none;
            border-radius:30px;
            overflow:hidden;
        }

        .cover{
            height:220px;
            background: linear-gradient(135deg,#4f46e5,#7c3aed);
            position:relative;
        }

        .profile-img{
            width:160px;
            height:160px;
            border-radius:50%;
            object-fit:cover;
            border:6px solid white;
            position:absolute;
            bottom:-80px;
            left:50%;
            transform:translateX(-50%);
        }

        .profile-body{
            padding-top:100px;
            padding-bottom:40px;
        }

        .user-name{
            font-size:32px;
            font-weight:bold;
        }

        .info-box{
            background:#f8f9ff;
            border-radius:18px;
            padding:18px;
        }

        .info-title{
            font-size:14px;
            color:#777;
        }

        .info-text{
            font-size:17px;
            font-weight:500;
        }

        .btn-custom{
            border-radius:12px;
            padding:10px 25px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-lg profile-card">

                <div class="cover">
                    <div class="back">
                        <a href="account_me.html"><i class="bi bi-arrow-left text-dark fs-4"></i></a>
                    </div>

                    <img src="assets/img/people.png"
                        class="profile-img">

                </div>

                <div class="card-body profile-body">

                    <div class="text-center">

                        <h2 class="user-name">
                            John Doe
                        </h2>

                    </div>

                    <div class="row mt-5 g-4">

                        <div class="col-md-6">

                            <div class="info-box">

                                <div class="info-title">
                                    អ៊ីមែល​
                                </div>

                                <div class="info-text">
                                    johndoe@gmail.com
                                </div>

                            </div>

                        </div>

                        <div class="col-md-6">

                            <div class="info-box">

                                <div class="info-title">
                                    លេខទូរស័ព្ទ
                                </div>

                                <div class="info-text">
                                    +855 12 345 678
                                </div>

                            </div>

                        </div>

                        <div class="col-12">

                            <div class="info-box">

                                <div class="info-title">
                                    ទីកន្លែងស្នាក់នៅ
                                </div>

                                <div class="info-text">
                                    Phnom Penh, Cambodia
                                </div>

                            </div>

                        </div>

                    </div>

                    <div class="text-center mt-5">

                        <a href="edit_profile.html"
                            class="btn btn-primary btn-custom">

                            <i class="bi bi-pencil-square"></i>
                            កែប្រែ

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
