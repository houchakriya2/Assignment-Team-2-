<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You&Me Shop</title>
    <link rel="icon" href="assets/img/logo-sak-img-removebg-preview.png" type="image/png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/style_payment_roeun.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Dangrek&family=Jersey+15&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Playwrite+IN:wght@100..400&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Exile&family=Kantumruy+Pro:ital,wght@0,100..700;1,100..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

</head>

<body>
    <div class="payment-container">
        <h2 class="titile-1">Payment</h2>

        <!-- Customer Information -->
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="example@email.com">
        </div>

        <!-- Payment Method -->
        <div class="form-group">
            <label>Payment Method</label>
            <select>
                <option>Credit / Debit Card</option>
                <option>ABA Pay</option>
                <option>Wing</option>
                <option>Cash on Delivery</option>
            </select>
        </div>

        <!-- Card Details -->
        <div class="form-group">
            <label>Card Number</label>
            <input type="text" placeholder="1234 5678 9012 3456">
        </div>

        <div class="row">
            <div class="form-group">
                <label>Expiry Date</label>
                <input type="text" placeholder="MM/YY">
            </div>
            <div class="form-group">
                <label>CVV</label>
                <input type="password" placeholder="123">
            </div>
        </div>

        <!-- Order Summary -->
        <div class="summary">
            <p><span>Product</span><span>$89.99</span></p>
            <p><span>Shipping</span><span>$5.00</span></p>
            <p class="total"><span>សរុប</span><span>$94.99</span></p>
        </div>
        <a href="indext.html">
            <button class="pay-btn">Pay Now</button>
        </a>

        <p class="secure">🔒 ការទូទាត់របស់អ្នកមានសុវត្តិភាព</p>
    </div>
</body>

</html>
